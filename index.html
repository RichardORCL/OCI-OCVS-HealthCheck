<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCVS Health Check</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="menu-wrap">
        <button class="hamburger" id="menu-toggle" aria-label="Menu" aria-haspopup="true" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <div class="app-menu" id="app-menu" role="menu" hidden>
          <button type="button" role="menuitem" id="menu-export">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5v8.2M4.8 6.5L8 9.7l3.2-3.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 11.5v2a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Export results (JSON)
          </button>
          <button type="button" role="menuitem" id="menu-import">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 9.7V1.5M4.8 4.7L8 1.5l3.2 3.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 11.5v2a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Import results
          </button>
          <div class="app-menu-divider"></div>
          <button type="button" role="menuitem" id="menu-reset" class="danger">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 4h10M6.5 4V2.7a.7.7 0 0 1 .7-.7h1.6a.7.7 0 0 1 .7.7V4M4.3 4l.6 9.4a1 1 0 0 0 1 .9h4.2a1 1 0 0 0 1-.9L11.7 4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Reset all
          </button>
          <div class="app-menu-divider"></div>
          <div class="app-menu-label">Editor</div>
          <button type="button" role="menuitem" id="menu-editor-toggle">
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="7" width="10" height="7" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 7V4.8a2.5 2.5 0 0 1 5 0V7" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="10.5" r="1.1" fill="currentColor"/></svg>
            Enable editor
          </button>
          <button type="button" role="menuitem" id="menu-editor-feedback" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 3.5A1.5 1.5 0 0 1 4 2h8a1.5 1.5 0 0 1 1.5 1.5v6A1.5 1.5 0 0 1 12 11H8.2L5 13.8V11H4a1.5 1.5 0 0 1-1.5-1.5v-6z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M5.2 5.6h5.6M5.2 7.9h3.6" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            View feedback
          </button>
          <button type="button" role="menuitem" id="menu-editor-download" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2.5h6.5L13 6v7.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M9.5 2.5V6H13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Download checklist (JSON)
          </button>
          <button type="button" role="menuitem" id="menu-editor-import" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2.5h6.5L13 6v7.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M9.5 2.5V6H13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 12.2V7.6M6.2 9.4L8 7.6l1.8 1.8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Import checklist (JSON)
          </button>
        </div>
      </div>
      <a class="brand" href="#/">
        <span class="brand-mark"></span>
        <span class="brand-name">Cloud</span>
      </a>
      <span class="topbar-divider"></span>
      <span class="topbar-title" id="topbar-title">OCVS Health Check</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-progress" id="topbar-progress" title="Overall progress">
        <div class="topbar-progress-track"><div class="topbar-progress-fill" id="topbar-progress-fill"></div></div>
        <span class="topbar-progress-label" id="topbar-progress-label">0%</span>
      </div>
    </div>
  </header>

  <nav class="category-nav" id="category-nav" aria-label="Health check categories"></nav>

  <main class="content" id="content"></main>

  <input type="file" id="import-file" accept="application/json" hidden />
  <input type="file" id="import-checklist-file" accept="application/json" hidden />

  <div class="modal-overlay" id="editor-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editor-modal-title">
      <h2 id="editor-modal-title">Enable editor</h2>
      <p>Enter the editor password to add, edit or remove categories and checklist items.</p>
      <input type="password" id="editor-password" placeholder="Password" autocomplete="off" />
      <div class="modal-error" id="editor-error" hidden>Incorrect password.</div>
      <div class="modal-actions">
        <button type="button" class="btn" id="editor-cancel">Cancel</button>
        <button type="button" class="btn primary" id="editor-submit">Enable</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
